version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    labels:
      - "dependencies"
      - "github-actions"
      - "chore"
      - "bump-patch"

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: daily
    labels:
      - "dependencies"
      - "rust"
      - "chore"
      - "bump-patch"

  - package-ecosystem: "terraform"
    directories:
      - "infrastructure/state"
      - "infrastructure/tests"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "terraform"
      - "chore"
      - "bump-patch"
